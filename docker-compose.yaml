services:
  postgres:
    image: postgres:13
    container_name: dm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  pgadmin:
    image: dpage/pgadmin4
    container_name: dm_pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  mage:
    build:
      context: ./mage
    container_name: dm_mage
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      MAGE_DATA_DIR: /home/src
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      BRONZE_SCHEMA: ${BRONZE_SCHEMA}
      NYC_TLC_BASE_URL: ${NYC_TLC_BASE_URL}
      NYC_TLC_ZONE_URL: ${NYC_TLC_ZONE_URL}
      INGEST_START_MONTH: ${INGEST_START_MONTH}
      INGEST_END_MONTH: ${INGEST_END_MONTH}
      DBT_TIMEOUT_SECONDS: ${DBT_TIMEOUT_SECONDS}
    ports:
      - "6789:6789"
    volumes:
      - ./mage:/home/src
    working_dir: /home/src
    command: /bin/sh -c "mage start mage_project"

volumes:
  pg_data:
  pgadmin_data: